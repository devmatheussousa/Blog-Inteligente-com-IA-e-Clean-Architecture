spring:
  application:
    name: blog-inteligente-com-ia-e-clean-architecture

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/blog_inteligente}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10

  jpa:
    hibernate:
      # 🔥 Padrão profissional com Flyway
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false

  # ✅ AGORA NO LUGAR CORRETO
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      connect-timeout: 10s
      timeout: 5s

    elasticsearch:
      repositories:
        enabled: true

  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}
    connection-timeout: 10s
    socket-timeout: 30s

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

    template:
      retry:
        enabled: true
        initial-interval: 3s
        max-attempts: 3

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
    org.flywaydb: DEBUG   # 🔥 importante pra debug

app:
  ai:
    provider: ${AI_PROVIDER:openai}
    api-key: ${OPENAI_API_KEY:}
    models:
      chat: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
      embedding: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
      image: ${OPENAI_IMAGE_MODEL:dall-e-3}
      moderation: ${OPENAI_MODERATION_MODEL:omni-moderation-latest}

  queue:
    post-generation: ${QUEUE_POST_GENERATION:post-generation-queue}
    content-moderation: ${QUEUE_CONTENT_MODERATION:content-moderation-queue}

  cache:
    ttl: ${CACHE_TTL:30m}